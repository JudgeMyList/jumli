name: Build crates

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-workspace-crates: true
          shared-key: "ci"
          save-if: false
      - name: Build crates
        run: cargo build
